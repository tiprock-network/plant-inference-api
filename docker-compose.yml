version: "3.9"

services:
  api:
    image: lincolnowiti/rutuba_ml_service:latest
    build: .
    container_name: fastapi-app
    ports:
      - "4440:4440"
    volumes:
      - .:/app   # enables hot reload
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
  watchtower:
    image: containrrr/watchtower
    container_name: rutuba-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30
    restart: unless-stopped